name: Build Entware arm7-3.2 rclone

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-entware:
    name: entware-arm7-3.2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.24"
          check-latest: true

      - name: Build rclone (size-reduced)
        shell: bash
        run: |
          set -euo pipefail

          # Entware arm7-3.2 => Linux ARMv7
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=0

          mkdir -p build

          # Build a small binary: strip symbols/debug + remove buildid + trim paths
          go build -v -trimpath \
            -tags "cmount" \
            -ldflags "-s -w -buildid=" \
            -o build/rclone .

          # Package
          cd build
          zip -9 rclone-entware-arm7-3.2.zip rclone

      - name: Create/Update GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: build/rclone-entware-arm7-3.2.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
